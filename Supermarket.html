<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LEO_N Supermarket</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:url('https://i.imgur.com/o8YtZqK.jpeg') no-repeat center center/cover;
color:white;
transition:0.3s;
}

/* dark mode */

.dark{
background:#121212;
color:white;
}

.overlay{
background:rgba(0,0,0,0.6);
min-height:100vh;
padding:20px;
}

header{
text-align:center;
padding:20px;
background:#ff9800;
border-radius:10px;
}

header h1{
margin:0;
letter-spacing:3px;
text-shadow:2px 2px 5px black;
}

/* navigation */

nav{
text-align:center;
margin:20px 0;
}

nav button{
margin:5px;
padding:10px 18px;
border:none;
border-radius:20px;
background:#ff5722;
color:white;
font-weight:bold;
cursor:pointer;
}

nav button:hover{
background:#ff9800;
}

/* layout */

.main-layout{
display:flex;
gap:20px;
}

/* sidebar */

.sidebar{
width:200px;
background:white;
color:black;
padding:15px;
border-radius:10px;
height:fit-content;
}

.sidebar button{
display:block;
margin:8px 0;
width:100%;
padding:8px;
border:none;
background:#eee;
cursor:pointer;
border-radius:5px;
}

/* content */

.content{
background:rgba(255,255,255,0.92);
color:#333;
padding:20px;
border-radius:10px;
flex:1;
}

/* MEDIUM IMAGE SLIDER */

.slider{
width:100%;
display:flex;
justify-content:center;
margin-bottom:20px;
}

.slider img{
width:100%;
max-width:600px;
height:auto;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* products */

.product-grid{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.product{
background:white;
padding:15px;
border-radius:10px;
width:220px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:180px;
border-radius:10px;
}

.price{
color:green;
font-weight:bold;
}

/* cart */

.cart{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin-top:20px;
}

.cart button{
margin-top:10px;
padding:5px 10px;
background:#ff5722;
color:white;
border:none;
cursor:pointer;
}

/* search */

.search-box input{
width:60%;
padding:10px;
border-radius:20px;
border:1px solid gray;
}

footer{
text-align:center;
margin-top:20px;
background:#ff9800;
padding:10px;
border-radius:8px;
color:white;
}

</style>

</head>

<body>

<div class="overlay">

<header>

<h1>LEO_N SUPERMARKET</h1>

</header>

<nav>

<button onclick="loadHome()">Home</button>

<button onclick="loadProducts()">Products</button>

<button onclick="loadContact()">Contact</button>

<button onclick="toggleDarkMode()">🌙 Dark Mode</button>

</nav>

<div class="main-layout">

<div class="sidebar">

<h3>Categories</h3>

<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('drinks')">Drinks</button>
<button onclick="filterCategory('snacks')">Snacks</button>
<button onclick="filterCategory('meat')">Meat</button>
<button onclick="filterCategory('vegetables')">Vegetables</button>
<button onclick="filterCategory('home')">Home Supplies</button>

</div>

<div class="content" id="mainContent">

<h2>Welcome</h2>

<div class="slider">

<img id="slideImg" src="download (1).jpg">

</div>

<p>Your one stop supermarket.</p>

</div>

</div>

<div class="cart">

<h3>🛒 Cart</h3>

<ul id="cartList"></ul>

<p>Total: $<span id="total">0</span></p>

<button onclick="clearCart()">Clear Cart</button>

</div>

<footer>

LEO_N Supermarket 2025

</footer>

</div>

<script>

/* slider images */

let images=[
"download (1).jpg",
"download (2).jpg",
"download.jpg",
"Fresh green vegetables assortment on transparent background.jpg",
"How Long Do the Appliances Last in Your Home_.jpg"
];

let index=0;

setInterval(()=>{

index=(index+1)%images.length;

let slider=document.getElementById("slideImg");

if(slider){
slider.src=images[index];
}

},3000);

/* dark mode */

function toggleDarkMode(){
document.body.classList.toggle("dark");
}

/* cart */

let total=0;

function addToCart(name,price){

let li=document.createElement("li");

li.textContent=name+" - $"+price;

document.getElementById("cartList").appendChild(li);

total+=price;

document.getElementById("total").textContent=total;

}

function clearCart(){

document.getElementById("cartList").innerHTML="";
total=0;
document.getElementById("total").textContent=0;

}

/* products */

function loadProducts(){

document.getElementById("mainContent").innerHTML=`

<h2>Products</h2>

<div class="search-box">
<input type="text" placeholder="search product..." onkeyup="searchProducts(this.value)">
</div>

<div class="product-grid">

<div class="product" data-cat="drinks">
<h3>Drinks</h3>
<img src="download (1).jpg">
<p class="price">$2-00</p>
<button onclick="addToCart('Drink',2)">Add</button>
</div>

<div class="product" data-cat="snacks">
<h3>Snacks</h3>
<img src="download (2).jpg">
<p class="price">$1-00</p>
<button onclick="addToCart('Snack',1)">Add</button>
</div>

<div class="product" data-cat="meat">
<h3>Meat</h3>
<img src="download.jpg">
<p class="price">$2-00 per 1kg</p>
<button onclick="addToCart('Meat',2)">Add</button>
</div>

<div class="product" data-cat="vegetables">
<h3>Vegetables</h3>
<img src="Fresh green vegetables assortment on transparent background.jpg">
<p class="price">$1-00</p>
<button onclick="addToCart('Vegetables',1)">Add</button>
</div>

<div class="product" data-cat="home">
<h3>Home Supplies</h3>
<img src="How Long Do the Appliances Last in Your Home_.jpg">
<p class="price">$40-00</p>
<button onclick="addToCart('Home Supplies',40)">Add</button>
</div>

</div>

`;

}

/* search */

function searchProducts(value){

value=value.toLowerCase();

document.querySelectorAll(".product").forEach(p=>{
p.style.display=p.innerText.toLowerCase().includes(value)?"block":"none";
});

}

/* category filter */

function filterCategory(cat){

document.querySelectorAll(".product").forEach(p=>{
p.style.display=(cat==="all"||p.dataset.cat===cat)?"block":"block";
});

}

/* home */

function loadHome(){

document.getElementById("mainContent").innerHTML=`

<h2>Welcome</h2>

<div class="slider">
<img id="slideImg" src="download (1).jpg">
</div>

<p>Shop quality groceries easily.</p>

`;

}

/* contact */

function loadContact(){

document.getElementById("mainContent").innerHTML=`

<h2>Contact</h2>

<p>Email: support@leonmarket.com</p>
<p>Phone: +263781540622</p>
<p>Harare Zimbabwe</p>

`;

}

</script>

</body>
</html>
